<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Triângulo azul principal -->
  <polygon points="100,20 180,180 20,180" fill="#007EA7"/>
  
  <!-- Triângulo azul mais escuro para profundidade -->
  <polygon points="100,20 180,180 20,180" fill="#005A7F" opacity="0.3"/>
  
  <!-- Raios de luz -->
  <g stroke="white" stroke-width="2" opacity="0.9">
    <line x1="100" y1="30" x2="100" y2="50"/>
    <line x1="130" y1="40" x2="145" y2="55"/>
    <line x1="150" y1="60" x2="160" y2="75"/>
    <line x1="155" y1="90" x2="170" y2="105"/>
    <line x1="70" y1="40" x2="55" y2="55"/>
    <line x1="50" y1="60" x2="40" y2="75"/>
    <line x1="45" y1="90" x2="30" y2="105"/>
  </g>
  
  <!-- Cruz branca -->
  <g stroke="white" stroke-width="4" stroke-linecap="round">
    <!-- Barra vertical da cruz -->
    <line x1="100" y1="80" x2="100" y2="160"/>
    <!-- Barra horizontal da cruz -->
    <line x1="75" y1="110" x2="125" y2="110"/>
  </g>
  
  <!-- Círculo ao redor da cruz para destaque -->
  <circle cx="100" cy="120" r="35" fill="none" stroke="white" stroke-width="2" opacity="0.4"/>
</svg>